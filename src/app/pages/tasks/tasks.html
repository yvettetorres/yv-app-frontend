<div class="pixel-dashboard">
  
  <header class="dashboard-header">
    <div class="header-left">
      <span class="header-icon">🌙</span>
      <h1>Task</h1>
    </div>
    <div class="header-right">
      <span class="user-tag">¿Qué tareas tienes pendientes?</span>
      <button class="btn-logout" (click)="onLogout()" title="Cerrar sesión">
        Salir
      </button>
    </div>
  </header>

  <div class="action-bar">
    <div class="title-section">
      <h2>Tareas Flotantes</h2>
      <p>Gestiona tus pendientes</p>
    </div>
    <button class="btn-add-task" (click)="onOpenModal()">
       Agregar tarea
    </button>
  </div>

  <div class="tasks-grid">
    @for (task of tasks.data; track task.projectId) {
      <div class="task-card">
        
        <div class="card-header">
          <span class="status-badge">
            {{ task.status || ' Pendiente' }}
          </span>
          <span class="project-id">#{{ task.projectId }}</span>
        </div>

        <div class="card-body">
          <h3>{{ task.title }}</h3>
          <p>{{ task.description }}</p>
        </div>

        <div class="card-footer">
          <span class="card-info"> Tarea activa</span>
          <div class="card-actions">
            <button class="action-btn edit" (click)="onOpenModal(task)" title="Editar">
              ✏️
            </button>
            <button class="action-btn delete" (click)="onDelete(task.projectId)" title="Eliminar">
              🗑️
            </button>
          </div>
        </div>

      </div>
    } @empty {
      <div class="no-tasks">
        <p>No hay tareas por ahora. 🌙</p>
      </div>
    }
  </div>

</div>
